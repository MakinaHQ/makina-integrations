protocol: "securitize"

# Securitize position accounting via the Makina OracleRegistry.
#
# OracleRegistry.getPrice(baseToken, quoteToken) returns "the price of one
# unit of baseToken in terms of quoteToken" — i.e. the number of quoteToken
# wei equivalent to 1 whole baseToken (= 10^baseDecimals base units),
# expressed in quoteToken decimals. Per-feed staleness checks and (optionally)
# 2-feed routing are handled inside the registry.
#
# Position value (in quoteToken decimals):
#   value = ds_balance * getPrice(ds_token, quote_token) / 10^ds_decimals
#
# `ds_token_unit_scale` MUST equal 10^ds_token_decimals
# (VBILL/USTB/BUIDL are 6 dec → 1e6 = "1000000").

constants:
  # Makina OracleRegistry — the canonical Makina price source. Aggregates
  # Chainlink-interface feeds; for VBILL it currently routes through the
  # Redstone VBILL/USD feed.
  oracle_registry_address:
    type: "address"
    value: "0xC388B72AB90Be82B230D919F9C05c87F9397f485"
  # MathHelper for mulDiv (balance * price / unit_scale).
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"

inputs:
  ds_token:
    type: "address"
  quote_token:
    type: "address"
  caliber_address:
    type: "address"
  ds_token_unit_scale:
    type: "uint256"

actions:
  account:
    calls:
      - description: "Get dsToken balance held by caliber"
        target: ${inputs.ds_token}
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: ${inputs.caliber_address}
        return:
          name: "ds_balance"
          type: "uint256"

      - description: "Get price: 1 whole dsToken in quote-token wei (uint256)"
        target: ${constants.oracle_registry_address}
        selector: "getPrice(address,address)"
        parameters:
          - type: "address"
            value: ${inputs.ds_token}
          - type: "address"
            value: ${inputs.quote_token}
        return:
          name: "price"
          type: "uint256"

      - description: "value = ds_balance * price / ds_token_unit_scale"
        target: ${constants.unsigned_math_helper_address}
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: ${returns.ds_balance}
          - type: "uint256"
            value: ${returns.price}
          - type: "uint256"
            value: ${inputs.ds_token_unit_scale}
        return:
          name: "value_in_quote_token"
          type: "uint256"

    reserved_slots:
      - type: "uint256"
        value: ${returns.value_in_quote_token}
      - type: "uint256"
        value: ${builtins.UINT256_MAX}
