protocol: "noon"

# Noon Staked USN (sUSN) Deposit Blueprint
# sUSN is a standard ERC-4626 vault (asset = USN, 18 dec). Staking is unrestricted.
#
# Two actions:
#   - deposit          : stake an exact USN amount into sUSN
#   - deposit_relative : stake a percentage (bps) of the caliber's USN balance
#
# Flow: USN.approve(sUSN, amount) -> sUSN.deposit(amount, receiver=caliber)
# receiver MUST be the caliber (context_helper.msgSender()).

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"

inputs:
  usn_address:
    type: "address"
  susn_address:
    type: "address"

actions:
  # Stake an exact USN amount into sUSN
  deposit:
    calls:
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      - description: "Approve sUSN vault to spend USN"
        target: "${inputs.usn_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.susn_address}"
          - type: "uint256"
            value: "${input_slots.amount_to_deposit}"

      - description: "Deposit USN into sUSN (mint shares to caliber)"
        target: "${inputs.susn_address}"
        selector: "deposit(uint256,address)"
        parameters:
          - type: "uint256"
            value: "${input_slots.amount_to_deposit}"
          - type: "address"
            value: "${returns.caliber_address}"

    input_slots:
      amount_to_deposit:
        type: "uint256"
        description: "Amount of USN to stake (18 decimals)"

  # Stake a percentage (basis points) of the caliber's USN balance into sUSN
  deposit_relative:
    calls:
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      - description: "Get caliber's USN balance"
        target: "${inputs.usn_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "usn_balance"
          type: "uint256"

      - description: "Calculate USN amount to stake from basis points"
        target: "${constants.math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.usn_balance}"
          - type: "uint256"
            value: "${input_slots.bps_to_deposit}"
          - type: "uint256"
            value: "10000"
        return:
          name: "amount_to_deposit"
          type: "uint256"

      - description: "Approve sUSN vault to spend USN"
        target: "${inputs.usn_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.susn_address}"
          - type: "uint256"
            value: "${returns.amount_to_deposit}"

      - description: "Deposit USN into sUSN (mint shares to caliber)"
        target: "${inputs.susn_address}"
        selector: "deposit(uint256,address)"
        parameters:
          - type: "uint256"
            value: "${returns.amount_to_deposit}"
          - type: "address"
            value: "${returns.caliber_address}"

    input_slots:
      bps_to_deposit:
        type: "uint256"
        description: "Basis points of USN balance to stake (10000 = 100%)"
