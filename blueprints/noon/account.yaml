protocol: "noon"

# Noon Staked USN (sUSN) Account Blueprint — BASE-TOKEN model (pending-only)
#
# Value = pending only, denominated in USN (18 dec).
#
#   pending = open WithdrawalHandler request amount (if any)          # USN, 18 dec
#
# WHY PENDING-ONLY (vs the #257 position model's active + pending):
# In this fund sUSN is registered as a caliber BASE token (addBaseToken + an
# OracleRegistry sUSN feed), so the held sUSN balance is priced directly by the
# base-token registry and already counted in AUM. Accounting it here again would
# DOUBLE-COUNT. This blueprint therefore only bridges the value that has LEFT the
# caliber's visible balances — the in-flight WithdrawalHandler request during the
# 7-day cooldown — exactly like blueprints/etherfi/account.yaml:account_pending_redemption
# (weETH is a base token; that blueprint returns only the redeemer's pending value).
#
# NAV CONTINUITY across request -> cooldown -> claim:
#   * request : sUSN base value drops by convertToAssets(sharesRedeemed) * price(USN);
#               pending rises by the SAME request_amount (USN). They cancel because
#               the sUSN feed is the 4626 rate route (price(sUSN) = rate * price(USN)).
#   * claim   : pending -> 0 and the claimed USN lands as a base-token balance,
#               valued by the registry. They cancel.
#
# PENDING TRACKING (KV store, mirrors #257 + infinifi's sentinel guard):
# withdrawalRequests are keyed per requestId with no aggregate getter, so we track
# a single open request per position via a KV sentinel = requestId + 1 (written by
# withdraw.yaml:request_withdrawal, cleared by claim_withdrawal). Sentinel 0 means
# "no open request". When the sentinel is 0 we read requestId 0 defensively
# (max(sentinel,1)-1) but ternary-gate the amount to 0 so a previously-claimed
# request 0 is never counted.

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  bytes32_helper_address:
    type: "address"
    value: "0x74DC739B8F98ad0F76Cd8900695DD8D5083E45D3"

inputs:
  withdrawal_handler_address:
    type: "address"
  kv_store_address:
    type: "address"
  kv_storage_key:
    type: "bytes32"

actions:
  account:
    calls:
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # === PENDING WITHDRAWAL REQUEST (KV-tracked) ===
      - description: "Get request sentinel from KV store (requestId + 1, or 0 if none)"
        target: "${inputs.kv_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.kv_storage_key}"
        return:
          name: "sentinel"
          type: "uint256"

      - description: "Is there an open request? (sentinel > 0)"
        target: "${constants.math_helper_address}"
        selector: "gt(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.sentinel}"
          - type: "uint256"
            value: "0"
        return:
          name: "has_open_request"
          type: "bool"

      # requestId = max(sentinel, 1) - 1  (avoids 0-1 underflow when sentinel == 0)
      - description: "Clamp sentinel to >= 1 to avoid underflow"
        target: "${constants.math_helper_address}"
        selector: "max(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.sentinel}"
          - type: "uint256"
            value: "1"
        return:
          name: "safe_sentinel"
          type: "uint256"

      - description: "Recover requestId (safe_sentinel - 1)"
        target: "${constants.math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.safe_sentinel}"
          - type: "uint256"
            value: "1"
        return:
          name: "request_id"
          type: "uint256"

      - description: "Read the withdrawal request (amount, timestamp, claimed)"
        target: "${inputs.withdrawal_handler_address}"
        selector: "getWithdrawalRequest(address,uint256)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "uint256"
            value: "${returns.request_id}"
        return:
          name: "withdrawal_request"
          type: "(uint256,uint256,bool)"

      - description: "Extract request amount (index 0, USN 18 dec)"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "(uint256,uint256,bool)"
            value: "${returns.withdrawal_request}"
          - type: "uint256"
            value: "0"
        return:
          name: "request_amount"
          type: "uint256"

      # pending = has_open_request ? request_amount : 0
      # The KV sentinel is cleared on claim, so sentinel > 0 implies the request is
      # still open (unclaimed); ternary-gating also zeroes out the defensive
      # requestId-0 read taken when sentinel == 0.
      - description: "Gate pending amount on the open-request flag"
        target: "${constants.math_helper_address}"
        selector: "ternary(bool,uint256,uint256)"
        parameters:
          - type: "bool"
            value: "${returns.has_open_request}"
          - type: "uint256"
            value: "${returns.request_amount}"
          - type: "uint256"
            value: "0"
        return:
          name: "pending_usn"
          type: "uint256"

    # Value returned = pending only (USN, 18 dec). The held sUSN is valued by the
    # caliber base-token registry, NOT here (would double-count). When no request is
    # open this returns 0, exactly like blueprints/etherfi/account.yaml.
    reserved_slots:
      - type: "uint256"
        value: "${returns.pending_usn}"
      - type: "uint256"
        value: "${builtins.UINT256_MAX}"
