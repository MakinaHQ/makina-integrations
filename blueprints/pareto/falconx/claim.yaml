protocol: "pareto-falconx"

# Pareto FalconX (vanilla) — Withdraw Phase 2 (claim_redeem / claim_instant_redeem)
#
# SECOND of TWO non-atomic phases. Phase 1 (`withdraw.yaml`) issued the
# requestWithdraw and credited the caliber a FalconXUSDC receipt token. This
# phase burns that receipt and pays out USDC to the caliber. `requestWithdraw`
# can be routed by Pareto into either a normal withdraw request or an instant
# withdraw request depending on APR/buffer state; expose both claim entrypoints.
#
# Normal phase 2 flow:
#   1. IdleCDOEpochVariant.claimWithdrawRequest()
#        -> burns the caliber's entire FalconXUSDC receipt
#        -> transfers USDC to the caliber
#   2. KV reset: clear the shared FalconX pending-withdraw flag
#
# Instant phase 2 flow:
#   1. IdleCDOEpochVariant.claimInstantWithdrawRequest()
#        -> burns the caliber's instant FalconXUSDC receipt
#        -> transfers USDC to the caliber
#   2. KV reset: clear the shared FalconX pending-withdraw flag
#
# Readiness preconditions (revert with NotAllowed() 0x3d693ada if missed):
#   - At least one full Pareto epoch + buffer has elapsed since requestWithdraw,
#     AND the manager has called stopEpoch (advancing IdleCreditVault.epochNumber).
#     Runtime check: IdleCreditVault.epochNumber() > lastWithdrawRequest(caliber).
#   - Caliber holds a non-zero FalconXUSDC receipt (Phase 1 actually ran).
#   - NOT keyring-gated — claim works even if the caliber's credential is revoked.
#
# Instant claim readiness:
#   - IdleCDOEpochVariant.allowInstantWithdraw() == true.

constants:
  cdo_address:
    type: "address"
    value: "0x433D5B175148dA32Ffe1e1A37a939E1b7e79be4d"

inputs:
  kv_store_address:
    type: "address"
  pending_withdraw_storage_key:
    type: "bytes32"

actions:
  claim_redeem:
    calls:
      - description: "Claim queued Pareto withdraw: burns FalconXUSDC receipt and pays out USDC"
        target: "${constants.cdo_address}"
        selector: "claimWithdrawRequest()"
        parameters: []

      - description: "Clear shared FalconX pending withdraw flag"
        target: "${inputs.kv_store_address}"
        selector: "reset(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.pending_withdraw_storage_key}"

  claim_instant_redeem:
    calls:
      - description: "Claim instant Pareto withdraw: burns instant FalconXUSDC receipt and pays out USDC"
        target: "${constants.cdo_address}"
        selector: "claimInstantWithdrawRequest()"
        parameters: []

      - description: "Clear shared FalconX pending withdraw flag"
        target: "${inputs.kv_store_address}"
        selector: "reset(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.pending_withdraw_storage_key}"
