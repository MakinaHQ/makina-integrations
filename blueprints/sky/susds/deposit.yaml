protocol: "sky-susds"

constants:
  math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"

inputs:
  usdc_address:
    type: "address"
  usds_address:
    type: "address"
  vault_address:
    type: "address"
  psm_address:
    type: "address"
  caliber_address:
    type: "address"
  referral_code:
    type: "uint16"

actions:
  deposit_vault:
    calls:
      - description: "Query USDS balance held by caliber before swap"
        target: "${inputs.usds_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
        return:
          name: "usds_balance_before"
          type: "uint256"

      - description: "Approve USDC to PSM wrapper"
        target: "${inputs.usdc_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.psm_address}"
          - type: "uint256"
            value: "${input_slots.amount_to_deposit}"

      - description: "Swap USDC to USDS via PSM (sellGem)"
        target: "${inputs.psm_address}"
        selector: "sellGem(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "uint256"
            value: "${input_slots.amount_to_deposit}"

      - description: "Query USDS balance held by caliber after swap"
        target: "${inputs.usds_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
        return:
          name: "usds_balance_after"
          type: "uint256"

      - description: "Compute USDS received from swap"
        target: "${constants.math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.usds_balance_after}"
          - type: "uint256"
            value: "${returns.usds_balance_before}"
        return:
          name: "usds_received"
          type: "uint256"

      - description: "Approve USDS to sUSDS vault"
        target: "${inputs.usds_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.vault_address}"
          - type: "uint256"
            value: "${returns.usds_received}"

      - description: "Deposit USDS into sUSDS vault with referral code"
        target: "${inputs.vault_address}"
        selector: "deposit(uint256,address,uint16)"
        parameters:
          - type: "uint256"
            value: "${returns.usds_received}"
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "uint16"
            value: "${inputs.referral_code}"

    input_slots:
      amount_to_deposit:
        type: "uint256"
        description: "Amount of USDC to deposit (converted to USDS via PSM, then staked to sUSDS)"
