protocol: "sky-susds"

constants:
  math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  usdc_address:
    type: "address"
    value: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
  usds_address:
    type: "address"
    value: "0xdC035D45d973E3EC169d2276DDab16f1e407384F"
  susds_address:
    type: "address"
    value: "0xa3931d71877C0E7a3148CB7Eb4463524FEc27fbD"
  psm_address:
    type: "address"
    value: "0xA188EEC8F81263234dA3622A406892F3D630f98c"

inputs:
  caliber_address:
    type: "address"
  referral_code:
    type: "uint16"

actions:
  deposit_vault:
    calls:
      - description: "Approve USDC to PSM wrapper"
        target: "${constants.usdc_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.psm_address}"
          - type: "uint256"
            value: "${input_slots.amount_to_deposit}"

      - description: "Swap USDC to USDS via PSM (sellGem)"
        target: "${constants.psm_address}"
        selector: "sellGem(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "uint256"
            value: "${input_slots.amount_to_deposit}"
        return:
          name: "usds_received"
          type: "uint256"

      - description: "Approve USDS to sUSDS vault"
        target: "${constants.usds_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.susds_address}"
          - type: "uint256"
            value: "${returns.usds_received}"

      - description: "Deposit USDS into sUSDS vault with referral code"
        target: "${constants.susds_address}"
        selector: "deposit(uint256,address,uint16)"
        parameters:
          - type: "uint256"
            value: "${returns.usds_received}"
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "uint16"
            value: "${inputs.referral_code}"

    input_slots:
      amount_to_deposit:
        type: "uint256"
        description: "Amount of USDC to deposit (converted to USDS via PSM, then staked to sUSDS)"
