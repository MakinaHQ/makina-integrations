protocol: "sky-susds"

constants:
  math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  usds_address:
    type: "address"
    value: "0xdC035D45d973E3EC169d2276DDab16f1e407384F"
  susds_address:
    type: "address"
    value: "0xa3931d71877C0E7a3148CB7Eb4463524FEc27fbD"
  psm_address:
    type: "address"
    value: "0xA188EEC8F81263234dA3622A406892F3D630f98c"

inputs:
  caliber_address:
    type: "address"

actions:
  redeem_vault:
    calls:
      - description: "Redeem sUSDS shares for USDS"
        target: "${constants.susds_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${input_slots.shares_to_redeem}"
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "address"
            value: "${inputs.caliber_address}"
        return:
          name: "usds_received"
          type: "uint256"

      - description: "Approve USDS to PSM wrapper"
        target: "${constants.usds_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.psm_address}"
          - type: "uint256"
            value: "${returns.usds_received}"

      - description: "Convert USDS amount to USDC (18 decimals to 6 decimals)"
        target: "${constants.math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.usds_received}"
          - type: "uint256"
            value: "1"
          - type: "uint256"
            value: "1000000000000"
        return:
          name: "usdc_amount"
          type: "uint256"

      - description: "Swap USDS to USDC via PSM (buyGem)"
        target: "${constants.psm_address}"
        selector: "buyGem(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "uint256"
            value: "${returns.usdc_amount}"

    input_slots:
      shares_to_redeem:
        type: "uint256"
        description: "The number of sUSDS shares to redeem (redeemed to USDS, then swapped to USDC via PSM)"

  redeem_vault_relative:
    calls:
      - description: "Query caliber balance of sUSDS shares"
        target: "${constants.susds_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
        return:
          name: "shares_balance"
          type: "uint256"

      - description: "Compute the amount of shares to redeem based on the input percentage"
        target: "${constants.math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_balance}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      - description: "Redeem computed sUSDS shares for USDS"
        target: "${constants.susds_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "address"
            value: "${inputs.caliber_address}"
        return:
          name: "usds_received"
          type: "uint256"

      - description: "Approve USDS to PSM wrapper"
        target: "${constants.usds_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.psm_address}"
          - type: "uint256"
            value: "${returns.usds_received}"

      - description: "Convert USDS amount to USDC (18 decimals to 6 decimals)"
        target: "${constants.math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.usds_received}"
          - type: "uint256"
            value: "1"
          - type: "uint256"
            value: "1000000000000"
        return:
          name: "usdc_amount"
          type: "uint256"

      - description: "Swap USDS to USDC via PSM (buyGem)"
        target: "${constants.psm_address}"
        selector: "buyGem(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "uint256"
            value: "${returns.usdc_amount}"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "The percentage of sUSDS shares to redeem, in basis points (10000 bps = 100%). Redeemed to USDS, then swapped to USDC via PSM."

  withdraw_vault:
    calls:
      - description: "Withdraw USDS assets from the sUSDS vault"
        target: "${constants.susds_address}"
        selector: "withdraw(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${input_slots.usds_to_withdraw}"
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "address"
            value: "${inputs.caliber_address}"

      - description: "Approve USDS to PSM wrapper"
        target: "${constants.usds_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.psm_address}"
          - type: "uint256"
            value: "${input_slots.usds_to_withdraw}"

      - description: "Convert USDS amount to USDC (18 decimals to 6 decimals)"
        target: "${constants.math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${input_slots.usds_to_withdraw}"
          - type: "uint256"
            value: "1"
          - type: "uint256"
            value: "1000000000000"
        return:
          name: "usdc_amount"
          type: "uint256"

      - description: "Swap USDS to USDC via PSM (buyGem)"
        target: "${constants.psm_address}"
        selector: "buyGem(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
          - type: "uint256"
            value: "${returns.usdc_amount}"

    input_slots:
      usds_to_withdraw:
        type: "uint256"
        description: "The amount of USDS assets to withdraw from the sUSDS vault (then swapped to USDC via PSM)"
