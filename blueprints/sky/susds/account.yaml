protocol: "sky-susds"

inputs:
  vault_address:
    type: "address"
  subject:
    type: "address"
  unsigned_math_helper:
    type: "address"

actions:
  account_vault:
    calls:
      - description: "Query caliber balance of sUSDS shares"
        target: "${inputs.vault_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${inputs.subject}"
        return:
          name: "vault_balance"
          type: "uint256"

      - description: "Preview redeem to get USDS value of sUSDS position"
        target: "${inputs.vault_address}"
        selector: "previewRedeem(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.vault_balance}"
        return:
          name: "usds_value"
          type: "uint256"

    reserved_slots:
      - type: "uint256"
        value: "${returns.usds_value}"
      - type: "uint256"
        value: "${builtins.UINT256_MAX}"
