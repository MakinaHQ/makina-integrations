protocol: "re"

# Re Protocol — synthetic "swap out": atomically redeem reUSD for the protocol's
# active instant-redemption payout token (sUSDe today) via the RedemptionGateway.
#
# Mechanism (verified on mainnet 2026-06-01):
#   RedemptionGateway.redeemInstant(uint256 shares, uint256 minPayout)
#     - gateway: 0x8aEb9453EF22Cb38abC7a3Af9c208F65C1BfE31e
#     - NOT AccessManager-restricted; gated only by kyc.isKYCApproved(msg.sender)
#       (dusd caliber is approved) and requires currentMode() == INSTANT.
#     - internally calls InstantRedemption.redeemFor(msg.sender, shares, minPayout):
#         * reUSD.transferFrom(caliber -> InstantRedemption) then burns it
#           => the caliber must approve reUSD to the InstantRedemption contract
#              (the gateway is NOT the token spender).
#         * pays out `payoutTokenRegistry.activePayoutToken()` (= sUSDe today,
#           0x9D39A5DE30e57443BfF2A8307A4256c8797A3497) from the redemption
#           buffer directly to the caliber.
#     - reverts if the instant buffer is short, mode != INSTANT, below min /
#       above max redemption, daily/user limit exceeded, or netPayout < minPayout.
#
# Both reUSD and the payout (sUSDe) are caliber base tokens, so this position's
# value is captured by the base-token registry and accounting returns 0.
#
# NOTE: the payout token is NOT a parameter — redeemInstant always pays the
# protocol's active payout token for the day. It is sUSDe now; on a day where the
# protocol rotates it, this action would yield a different base token. When the
# instant buffer is depleted, exit via the caliber swap_module instead (reUSD is
# a base token), or use the window-redemption flow (not modelled here).
#
# Expected inputs (from instructions/reusd-swap.yaml):
#   gateway_address             — RedemptionGateway (call target)
#   instant_redemption_address  — InstantRedemption (reUSD approval spender)
#   reusd_address               — reUSD share token
#   caliber_address             — caliber (relative variant: reUSD balance source)

constants:
  # MathHelper — relative variant bps math: mulDiv(balance, bps, 10000).
  # Same helper used by blueprints/securitize/withdraw.yaml.
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"

inputs:
  gateway_address:
    type: "address"
  instant_redemption_address:
    type: "address"
  reusd_address:
    type: "address"
  caliber_address:
    type: "address"

actions:
  # Absolute variant: caller specifies an exact reUSD amount to redeem.
  redeem:
    calls:
      - description: "Approve InstantRedemption to pull reUSD (the gateway routes through it)"
        target: "${inputs.reusd_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.instant_redemption_address}"
          - type: "uint256"
            value: "${input_slots.amount_shares}"

      - description: "Instant-redeem reUSD for the active payout token (sUSDe) via the gateway"
        target: "${inputs.gateway_address}"
        selector: "redeemInstant(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${input_slots.amount_shares}"
          - type: "uint256"
            value: "${input_slots.min_payout}"

    input_slots:
      amount_shares:
        type: "uint256"
        description: "Exact reUSD amount to redeem (18-dec)"
      min_payout:
        type: "uint256"
        description: "Minimum payout token to receive (slippage protection, sUSDe 18-dec)"

  # Relative variant: caller specifies a basis-points fraction of the caliber's
  # reUSD balance to redeem.
  redeem_relative:
    calls:
      - description: "Read caliber's reUSD balance"
        target: "${inputs.reusd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${inputs.caliber_address}"
        return:
          name: "reusd_balance"
          type: "uint256"

      - description: "amount_shares = balance * bps_to_redeem / 10000"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.reusd_balance}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "amount_shares"
          type: "uint256"

      - description: "Approve InstantRedemption to pull reUSD (the gateway routes through it)"
        target: "${inputs.reusd_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${inputs.instant_redemption_address}"
          - type: "uint256"
            value: "${returns.amount_shares}"

      - description: "Instant-redeem reUSD for the active payout token (sUSDe) via the gateway"
        target: "${inputs.gateway_address}"
        selector: "redeemInstant(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.amount_shares}"
          - type: "uint256"
            value: "${input_slots.min_payout}"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of caliber's reUSD balance to redeem (10000 = 100%)"
      min_payout:
        type: "uint256"
        description: "Minimum payout token to receive (slippage protection, sUSDe 18-dec)"
