protocol: "royco-st-syrupusdc"

# Royco Senior Tranche syrupUSDC Withdraw Blueprint
# Two-step manual withdrawal via Maple WithdrawalManager:
#
# 1. request_redeem - Redeem ST shares -> syrupUSDC -> requestRedeem (Maple queue). Accounting reads userEscrowedShares from WithdrawalManager.
#
# 2. USDC is airdropped (need to run accounting to clear pendings)

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  syrupusdc_address:
    type: "address"
    value: "0x80ac24aA929eaF5013f6436cdA2a7ba190f5Cc0b"
  senior_tranche_address:
    type: "address"
    value: "0x66182442522D3049A941035190C315379c959250"
  withdrawal_manager_address:
    type: "address"
    value: "0x1bc47a0Dd0FdaB96E9eF982fdf1F34DC6207cfE3"

inputs: {}

actions:
  # Step 1: Redeem ST -> syrupUSDC -> requestRedeem (queue shares)
  request_redeem:
    calls:
      # 1. Get caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. Get ST share balance
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      # 3. Calculate shares to redeem from bps
      - description: "Calculate shares to redeem based on basis points"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      # 4. Balance sandwich: syrupUSDC before ST redeem
      - description: "Get syrupUSDC balance before ST redeem"
        target: "${constants.syrupusdc_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "syrupusdc_before"
          type: "uint256"

      # 5. Redeem ST shares to receive syrupUSDC
      - description: "Redeem Senior Tranche shares to receive syrupUSDC"
        target: "${constants.senior_tranche_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

      # 6. Balance sandwich: syrupUSDC after ST redeem
      - description: "Get syrupUSDC balance after ST redeem"
        target: "${constants.syrupusdc_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "syrupusdc_after"
          type: "uint256"

      # 7. Calculate syrupUSDC received from ST redeem (after - before)
      - description: "Calculate syrupUSDC received from ST redeem"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.syrupusdc_after}"
          - type: "uint256"
            value: "${returns.syrupusdc_before}"
        return:
          name: "syrupusdc_delta"
          type: "uint256"

      # 8. Submit syrupUSDC to Maple withdrawal queue
      - description: "Request syrupUSDC redemption via Maple withdrawal queue"
        target: "${constants.syrupusdc_address}"
        selector: "requestRedeem(uint256,address)"
        parameters:
          - type: "uint256"
            value: "${returns.syrupusdc_delta}"
          - type: "address"
            value: "${returns.caliber_address}"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of ST shares to redeem (10000 = 100%)"
