protocol: "royco-jt-pareto-falconx"

# Royco Junior Tranche Pareto FalconX Account Blueprint (USDC-denominated)
# Sums caliber's exposure in AA-tranche units, then converts ONCE to USDC via
# Pareto's virtualPrice(AA). Plus the FalconXUSDC pending-withdraw receipt
# (already in USDC 6-dec).
#
# Components:
#   1. Active JT position: JT.convertToAssets(jt_shares) -> (stAssets, jtAssets, nav)
#      Both stAssets and jtAssets are in TRANCHE_UNIT = AA tranche (18 dec) and both are
#      populated for JT (kernel distributes pro-rata claim across both accumulators).
#   2. Pending Pareto withdrawal: FalconXUSDC.balanceOf(caliber)  (USDC, 6 dec)
#   3. total_aa = stAssets + jtAssets
#   4. usdc_value = total_aa * virtualPrice(AA) / 1e18 + pending_usdc
#
# Why not nav: keeps accounting correct during the multi-week withdraw window when the
# caliber holds FalconXUSDC instead of AA (kernel's nav does NOT include the receipt).

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  bytes32_helper_address:
    type: "address"
    value: "0x74DC739B8F98ad0F76Cd8900695DD8D5083E45D3"
  junior_tranche_address:
    type: "address"
    value: "0x8e0EC43e51B88AA2324102E1A3D667822bE51a6d"
  kernel_address:
    type: "address"
    value: "0x15bb63C07740ff972F76716cAcC5766f0C641791"
  cdo_address:
    type: "address"
    value: "0x433D5B175148dA32Ffe1e1A37a939E1b7e79be4d"
  aa_tranche_address:
    type: "address"
    value: "0xC26A6Fa2C37b38E549a4a1807543801Db684f99C"
  falconx_usdc_address:
    type: "address"
    value: "0x17E9Ab2992dfecBe779a06A92a6cDB9fE6aEeEf3"

inputs: {}

actions:
  account:
    calls:
      # 1. caliber address
      - description: "Get caliber's address"
        target: "${constants.context_helper_address}"
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. Sync tranche accounting (crystallise fees, refresh stRawNAV / jtRawNAV)
      - description: "Sync tranche accounting on the Royco kernel"
        target: "${constants.kernel_address}"
        selector: "syncTrancheAccounting()"
        parameters: []

      # 3. JT balance
      - description: "Get Junior Tranche share balance"
        target: "${constants.junior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "jt_shares"
          type: "uint256"

      # 4. JT -> (stAssets, jtAssets, nav) tuple
      - description: "Convert JT shares to (stAssets, jtAssets, nav) tuple"
        target: "${constants.junior_tranche_address}"
        selector: "convertToAssets(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.jt_shares}"
        return:
          name: "asset_claims"
          type: "(uint256,uint256,uint256)"

      # 5. Extract stAssets (slot 0) — the JT's pro-rata claim attributed to the ST layer accumulator.
      - description: "Extract stAssets (AA tranche units, 18 dec) from tuple [index 0] — JT's claim via ST accumulator"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "(uint256,uint256,uint256)"
            value: "${returns.asset_claims}"
          - type: "uint256"
            value: "0"
        return:
          name: "st_aa"
          type: "uint256"

      # 6. Extract jtAssets (slot 1) — the JT's main pro-rata claim.
      - description: "Extract jtAssets (AA tranche units, 18 dec) from tuple [index 1] — JT's main claim"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "(uint256,uint256,uint256)"
            value: "${returns.asset_claims}"
          - type: "uint256"
            value: "1"
        return:
          name: "jt_aa"
          type: "uint256"

      # 7. total_aa = st_aa + jt_aa — full caliber pro-rata claim in AA units.
      - description: "Sum claim across both layer accumulators: st_aa + jt_aa"
        target: "${constants.unsigned_math_helper_address}"
        selector: "add(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_aa}"
          - type: "uint256"
            value: "${returns.jt_aa}"
        return:
          name: "total_aa"
          type: "uint256"

      # 8. virtualPrice(AA) — USDC-6dec per 1e18 AA (live mark-to-market).
      # Per Pareto integrator guidance, use virtualPrice rather than tranchePrice
      # (last stored). Equivalent during an active epoch for the
      # IdleCDOEpochVariant; kept consistent with the ST sibling.
      - description: "Read Pareto AA virtual price (USDC 6-dec per 1e18 AA)"
        target: "${constants.cdo_address}"
        selector: "virtualPrice(address)"
        parameters:
          - type: "address"
            value: "${constants.aa_tranche_address}"
        return:
          name: "tranche_price"
          type: "uint256"

      # 9. usdc_from_aa = total_aa * tranche_price / 1e18
      - description: "Convert total_aa to USDC: (total_aa * tranche_price) / 1e18"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.total_aa}"
          - type: "uint256"
            value: "${returns.tranche_price}"
          - type: "uint256"
            value: "1000000000000000000"
        return:
          name: "usdc_from_aa"
          type: "uint256"

      # 10. pending_usdc = FalconXUSDC.balanceOf(caliber) (6-dec USDC, principal-only)
      # As with the ST sibling: for FalconX the unscaledApr > 0 so the APR=0
      # settlement bucket (apr0Users[caliber].settledInterest) is never populated.
      # For Fasanara-style (APR=0-default) Pareto vaults this term must also be added.
      - description: "Get pending FalconXUSDC withdraw receipt (USDC 6-dec)"
        target: "${constants.falconx_usdc_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "pending_usdc"
          type: "uint256"

      # 11. total_usdc = usdc_from_aa + pending_usdc
      - description: "Sum usdc_from_aa + pending_usdc"
        target: "${constants.unsigned_math_helper_address}"
        selector: "add(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.usdc_from_aa}"
          - type: "uint256"
            value: "${returns.pending_usdc}"
        return:
          name: "total_usdc"
          type: "uint256"

    reserved_slots:
      - type: "uint256"
        value: "${returns.total_usdc}"
      - type: "uint256"
        value: "${builtins.UINT256_MAX}"
