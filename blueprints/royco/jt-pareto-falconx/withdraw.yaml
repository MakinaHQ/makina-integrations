protocol: "royco-jt-pareto-falconx"

# Royco Junior Tranche over Pareto FalconX — Withdraw Phase 1 (request_redeem)
#
# This is the FIRST of TWO non-atomic phases. The two phases are separated by ~32-65 days
# (one full Pareto epoch + buffer); the second phase is in `claim.yaml`.
#
# Phase 1 flow:
#   1. KV guard: require no shared FalconX withdraw already pending
#   2. RoycoJT.redeem(shares, caliber, caliber)
#        -> kernel transfers AA tranche tokens to caliber
#   3. IdleCDOEpochVariant.requestWithdraw(aaDelta, AATranche)
#        -> burns AA from caliber
#        -> mints FalconXUSDC receipt token (6-dec ERC20) to caliber
#   4. KV flag: mark the shared FalconX withdraw as pending until claim clears it
#
# Between Phase 1 and Phase 2 the caliber holds FalconXUSDC instead of AA / JT. The
# `account.yaml` blueprint covers all three component states.
#
# Hard preconditions (revert if missed):
#   - isEpochRunning() == false                (Pareto rejects requestWithdraw mid-epoch)
#   - allowAAWithdrawRequest() == true         (only true between epochs)
#   - Caliber has Royco grant for (JT, redeem selector) — same JT_LP role as JT.deposit
#   - Caliber has Pareto Keyring policy 18 credential
#   - defaulted() == false                     (else withdrawals partial / blocked)
#
# Coverage-gate caveat (divergence from ST.redeem which is NOT coverage-gated):
#   JT.redeem CAN revert with the accountant's coverage error if the redeem size would
#   leave coverage below `coverageWAD` or utilization above `liquidationUtilizationWAD`.
#   The operator should size redemptions accordingly; the bps_to_redeem input is the
#   only operator control here.
#
# Approval requirement: NONE.
#   - JT.redeem burns the caliber's own JT shares (no allowance from caliber needed).
#   - requestWithdraw is called by the AA owner (the caliber); the AA is burned by
#     the CDO via _burn(msg.sender, _amount). No allowance to set.

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  caliber_helper_address:
    type: "address"
    value: "0x6E2ED2f457c41F38556Ab0c2b1185cc9e6563d8D"
  boolean_helper_address:
    type: "address"
    value: "0x00c93e3b09Ca2f544487d4298339765EadCD8353"
  cdo_address:
    type: "address"
    value: "0x433D5B175148dA32Ffe1e1A37a939E1b7e79be4d"
  aa_tranche_address:
    type: "address"
    value: "0xC26A6Fa2C37b38E549a4a1807543801Db684f99C"
  junior_tranche_address:
    type: "address"
    value: "0x8e0EC43e51B88AA2324102E1A3D667822bE51a6d"

inputs:
  kv_store_address:
    type: "address"
  pending_withdraw_storage_key:
    type: "bytes32"

actions:
  request_redeem:
    calls:
      # 0. caliber address
      - description: "Get caliber's address"
        target: "${constants.context_helper_address}"
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 1. Guard against overlapping FalconX withdraws across vanilla and Royco wrappers
      - description: "Read shared FalconX pending withdraw flag"
        target: "${inputs.kv_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.pending_withdraw_storage_key}"
        return:
          name: "existing_pending_withdraw"
          type: "uint256"

      - description: "Check no shared FalconX withdraw is pending"
        target: "${constants.caliber_helper_address}"
        selector: "eq(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.existing_pending_withdraw}"
          - type: "uint256"
            value: "0"
        return:
          name: "no_pending_withdraw"
          type: "bool"

      - description: "Revert if another FalconX withdraw is already pending"
        target: "${constants.boolean_helper_address}"
        selector: "revertIfFalse(bool)"
        parameters:
          - type: "bool"
            value: "${returns.no_pending_withdraw}"

      # 2. Compute share amount from bps (10000 = 100%)
      - description: "Get Junior Tranche share balance"
        target: "${constants.junior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "jt_shares"
          type: "uint256"

      - description: "Calculate shares to redeem from basis points"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.jt_shares}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      # 3. AA balance sandwich (capture exactly what the kernel transferred out)
      - description: "Snapshot AA balance before redeem"
        target: "${constants.aa_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "aa_before"
          type: "uint256"

      - description: "Redeem JT shares to receive AA tranche tokens"
        target: "${constants.junior_tranche_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

      - description: "Snapshot AA balance after redeem"
        target: "${constants.aa_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "aa_after"
          type: "uint256"

      - description: "Compute aa_delta = aa_after - aa_before"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.aa_after}"
          - type: "uint256"
            value: "${returns.aa_before}"
        return:
          name: "aa_delta"
          type: "uint256"

      # 4. Submit AA into Pareto's withdraw queue -> mints FalconXUSDC receipt to caliber
      - description: "Request withdraw on Pareto IdleCDOEpochVariant (burns AA, mints FalconXUSDC receipt)"
        target: "${constants.cdo_address}"
        selector: "requestWithdraw(uint256,address)"
        parameters:
          - type: "uint256"
            value: "${returns.aa_delta}"
          - type: "address"
            value: "${constants.aa_tranche_address}"

      # 5. Mark the shared receipt as pending so no second position also counts it
      - description: "Store shared FalconX pending withdraw flag"
        target: "${inputs.kv_store_address}"
        selector: "set(bytes32,bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.pending_withdraw_storage_key}"
          - type: "uint256"
            value: "1"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of JT shares to redeem (10000 = 100%)"
