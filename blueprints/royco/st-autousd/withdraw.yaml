protocol: "royco-st-autousd"

# Royco Senior Tranche AutoUSD Withdraw Blueprint
# Single-transaction withdraw: redeem ST shares -> autoUSD -> redeem autoUSD -> USDC
# No cooldown period — completes in one transaction.
#
# Uses balance sandwich pattern to isolate autoUSD received from ST redeem,
# avoiding inclusion of pre-existing autoUSD balances from other positions.
#
# Prerequisites:
#   - Caliber must have AccessManager role (15192588971413990205) on 0xd567ccbb336eb71ec2537057e2bcf6db840bb71d
#   - No approvals needed (caller is owner for both redeems)
#
# 8 calls total

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  autousd_address:
    type: "address"
    value: "0xa7569A44f348d3D70d8ad5889e50F78E33d80D35"
  senior_tranche_address:
    type: "address"
    value: "0x73C641fe41EB0270C7f473f3c3E4A40eb97fd8dE"

inputs: {}

actions:
  withdraw:
    calls:
      # 1. Get caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. Get ST share balance
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      # 3. Calculate shares to redeem from bps
      - description: "Calculate shares to redeem based on basis points"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      # 4. Balance sandwich: autoUSD before ST redeem
      - description: "Get autoUSD balance before ST redeem"
        target: "${constants.autousd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "autousd_before"
          type: "uint256"

      # 5. Redeem ST shares to receive autoUSD
      - description: "Redeem Senior Tranche shares to receive autoUSD"
        target: "${constants.senior_tranche_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

      # 6. Balance sandwich: autoUSD after ST redeem
      - description: "Get autoUSD balance after ST redeem"
        target: "${constants.autousd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "autousd_after"
          type: "uint256"

      # 7. Calculate autoUSD received from ST redeem (after - before)
      - description: "Calculate autoUSD received from ST redeem"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.autousd_after}"
          - type: "uint256"
            value: "${returns.autousd_before}"
        return:
          name: "autousd_delta"
          type: "uint256"

      # 8. Redeem autoUSD delta for USDC (no approval needed, caller is owner)
      - description: "Redeem autoUSD for USDC"
        target: "${constants.autousd_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.autousd_delta}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of ST shares to redeem (10000 = 100%)"
