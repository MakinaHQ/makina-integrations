protocol: "royco-st-snusd"

# Royco Senior Tranche sNUSD NAV-based Account Blueprint
# Syncs tranche accounting, then uses the NAV field from convertToAssets
# to price the active ST position in USD (18 decimals), scaled down to USDC (6 decimals).
# Also tracks NUSD locked in sNUSD cooldown separately.
# NAV accounts for both ST and JT asset claims including loss events.

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  bytes32_helper_address:
    type: "address"
    value: "0x74DC739B8F98ad0F76Cd8900695DD8D5083E45D3"
  snusd_address:
    type: "address"
    value: "0x08EFCC2F3e61185D0EA7F8830B3FEc9Bfa2EE313"
  senior_tranche_address:
    type: "address"
    value: "0x2070Af1C865f5d764F673Baf5654822947e71243"
  kernel_address:
    type: "address"
    value: "0x0aE0978B868804929fd4C06B3B22D9197B8cd3c6"

inputs: {}

actions:
  account_nav:
    calls:
      # Get caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # Sync tranche accounting state before reading NAV
      - description: "Sync tranche accounting on the market kernel"
        target: "${constants.kernel_address}"
        selector: "syncTrancheAccounting()"
        parameters: []

      # Get ST share balance
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      # Convert ST shares to asset claims tuple (stAssets, jtAssets, nav)
      - description: "Convert ST shares to asset claims with NAV"
        target: "${constants.senior_tranche_address}"
        selector: "convertToAssets(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
        return:
          name: "asset_claims"
          type: "(uint256,uint256,uint256)"

      # Extract NAV (index 2) from the tuple - USD value with 18 decimals
      - description: "Extract NAV (USD 18 decimals) from asset claims tuple"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "(uint256,uint256,uint256)"
            value: "${returns.asset_claims}"
          - type: "uint256"
            value: "2"
        return:
          name: "nav_usd_18dec"
          type: "uint256"

      # Scale NAV from 18 decimals to 6 decimals (USDC)
      - description: "Convert NAV from USD (18 dec) to USDC (6 dec)"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.nav_usd_18dec}"
          - type: "uint256"
            value: "1"
          - type: "uint256"
            value: "1000000000000"
        return:
          name: "usdc_value"
          type: "uint256"

      # Get cooldown state tuple (cooldownEnd, underlyingAmount)
      - description: "Get sNUSD cooldown state"
        target: "${constants.snusd_address}"
        selector: "cooldowns(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "cooldown_data"
          type: "(uint256,uint256)"

      # Extract underlyingAmount (index 1) from cooldown tuple
      - description: "Extract NUSD amount locked in cooldown"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "(uint256,uint256)"
            value: "${returns.cooldown_data}"
          - type: "uint256"
            value: "1"
        return:
          name: "cooldown_nusd"
          type: "uint256"

    reserved_slots:
      - type: "uint256"
        value: "${returns.usdc_value}"
      - type: "uint256"
        value: "${returns.cooldown_nusd}"
      - type: "uint256"
        value: "${builtins.UINT256_MAX}"
