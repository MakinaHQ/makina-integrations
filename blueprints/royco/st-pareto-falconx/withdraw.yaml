protocol: "royco-st-pareto-falconx"

# Royco Senior Tranche over Pareto FalconX — Withdraw Phase 1 (request_redeem)
#
# This is the FIRST of TWO non-atomic phases. The two phases are separated by ~32-65 days
# (one full Pareto epoch + buffer); the second phase is in `claim.yaml`.
#
# Phase 1 flow:
#   1. RoycoST.redeem(shares, caliber, caliber)
#        -> kernel transfers AA tranche tokens to caliber
#   2. IdleCDOEpochVariant.requestWithdraw(aaDelta, AATranche)
#        -> burns AA from caliber
#        -> mints FalconXUSDC receipt token (6-dec ERC20) to caliber
#
# Between Phase 1 and Phase 2 the caliber holds FalconXUSDC instead of AA / ST. The
# `account.yaml` blueprint covers all three component states.
#
# Hard preconditions (revert if missed):
#   - isEpochRunning() == false                (Pareto rejects requestWithdraw mid-epoch)
#   - allowAAWithdrawRequest() == true         (only true between epochs)
#   - Caliber has Royco grant for (ST, redeem selector)
#   - Caliber has Pareto Keyring policy 18 credential
#   - defaulted() == false                     (else withdrawals partial / blocked)
#
# Approval requirement: NONE.
#   - ST.redeem burns the caliber's own ST shares (no allowance from caliber needed).
#   - requestWithdraw is called by the AA owner (the caliber); the AA is burned by
#     the CDO via _burn(msg.sender, _amount). No allowance to set.

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  cdo_address:
    type: "address"
    value: "0x433D5B175148dA32Ffe1e1A37a939E1b7e79be4d"
  aa_tranche_address:
    type: "address"
    value: "0xC26A6Fa2C37b38E549a4a1807543801Db684f99C"
  senior_tranche_address:
    type: "address"
    value: "0x694ADB3077BBecE31882B6d6A74fc4A4fA6a754b"

inputs: {}

actions:
  request_redeem:
    calls:
      # 0. caliber address
      - description: "Get caliber's address"
        target: "${constants.context_helper_address}"
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 1. Compute share amount from bps (10000 = 100%)
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      - description: "Calculate shares to redeem from basis points"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      # 2. AA balance sandwich (capture exactly what the kernel transferred out)
      - description: "Snapshot AA balance before redeem"
        target: "${constants.aa_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "aa_before"
          type: "uint256"

      - description: "Redeem ST shares to receive AA tranche tokens"
        target: "${constants.senior_tranche_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

      - description: "Snapshot AA balance after redeem"
        target: "${constants.aa_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "aa_after"
          type: "uint256"

      - description: "Compute aa_delta = aa_after - aa_before"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.aa_after}"
          - type: "uint256"
            value: "${returns.aa_before}"
        return:
          name: "aa_delta"
          type: "uint256"

      # 3. Submit AA into Pareto's withdraw queue -> mints FalconXUSDC receipt to caliber
      - description: "Request withdraw on Pareto IdleCDOEpochVariant (burns AA, mints FalconXUSDC receipt)"
        target: "${constants.cdo_address}"
        selector: "requestWithdraw(uint256,address)"
        parameters:
          - type: "uint256"
            value: "${returns.aa_delta}"
          - type: "address"
            value: "${constants.aa_tranche_address}"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of ST shares to redeem (10000 = 100%)"
