protocol: "royco-st-pareto-falconx"

# Royco Senior Tranche over Pareto FalconX — Account (Path A, asset-space full)
#
# Sums the caliber's exposure in AA-tranche units, converts ONCE to USDC via Pareto's
# `virtualPrice(AA)`, then adds the FalconXUSDC pending-withdraw receipt (already in
# USDC 6-dec). Path A is chosen over the NAV path (`nav / 1e12`) because it remains
# correct during the withdraw window when the caliber holds FalconXUSDC instead of AA
# (the kernel's `nav` does NOT include the receipt — the AA was burned at requestWithdraw).
#
# Pricing call: per Pareto integrator guidance use `virtualPrice(AA)` (live mark-to-market)
# rather than `tranchePrice(AA)` (stored value, only updated at sync events). For the
# IdleCDOEpochVariant the two are numerically equivalent during an active epoch (no
# continuous accrual) and at sync boundaries, but `virtualPrice` is what the protocol
# team supports for integrators across vault types.
#
# Algorithm:
#   1.  caliber_address    = ContextHelper.msgSender()
#   2.  Kernel.syncTrancheAccounting()                                 [state-mutating]
#   3.  st_shares          = ST.balanceOf(caliber)
#   4.  (stAssets, jtAssets, nav) = ST.convertToAssets(st_shares)      [3-tuple via getTupleWord]
#   5.  total_aa           = stAssets + jtAssets
#   6.  tranche_price      = IdleCDOEpochVariant.virtualPrice(AA)      [USDC-6dec per 1e18 AA]
#   7.  usdc_from_aa       = total_aa * tranche_price / 1e18
#   8.  pending_usdc       = FalconXUSDC.balanceOf(caliber)            [already 6-dec]
#   9.  total_usdc         = usdc_from_aa + pending_usdc
#
# >>> NOTE FOR FUTURE INTEGRATORS COPYING THIS BLUEPRINT (e.g. Fasanara ST) <<<
# We intentionally OMIT a term for `apr0Users[caliber].settledInterest` here. For
# FalconX this is safe because Pareto's `unscaledApr` is always > 0 on this vault,
# so the APR=0 settlement bucket is never populated. For vaults that default to
# APR=0 (Fasanara is the canonical example), the IdleCreditVault payout in
# `claimWithdrawRequest` is:
#     FalconXUSDC.balanceOf(caliber) + apr0Users[caliber].settledInterest
# The receipt is burned 1:1 with PRINCIPAL only, so any interest accrued on the
# APR=0 settlement bucket is paid on TOP of the receipt and not reflected in
# `balanceOf`. If you reuse this blueprint for an APR=0-default vault, add:
#   - a `IdleCreditVault.apr0Users(caliber)` call returning
#     `(uint256 principal, uint256 principalEpoch, uint256 settledPrincipal,
#      uint256 settledInterest)`,
#   - a `bytes32_helper.getTupleWord(..., 3)` to extract `settledInterest`, and
#   - an extra `add` summing it into `pending_usdc`.
# The struct field order above is from Idle-Labs/idle-tranches
# contracts/strategies/idle/IdleCreditVault.sol; double-check before copying.

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  bytes32_helper_address:
    type: "address"
    value: "0x74DC739B8F98ad0F76Cd8900695DD8D5083E45D3"
  senior_tranche_address:
    type: "address"
    value: "0x694ADB3077BBecE31882B6d6A74fc4A4fA6a754b"
  kernel_address:
    type: "address"
    value: "0x15bb63C07740ff972F76716cAcC5766f0C641791"
  cdo_address:
    type: "address"
    value: "0x433D5B175148dA32Ffe1e1A37a939E1b7e79be4d"
  aa_tranche_address:
    type: "address"
    value: "0xC26A6Fa2C37b38E549a4a1807543801Db684f99C"
  falconx_usdc_address:
    type: "address"
    value: "0x17E9Ab2992dfecBe779a06A92a6cDB9fE6aEeEf3"

inputs: {}

actions:
  account:
    calls:
      # 1. caliber address
      - description: "Get caliber's address"
        target: "${constants.context_helper_address}"
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. Sync tranche accounting (crystallise fees, refresh stRawNAV / jtRawNAV)
      - description: "Sync tranche accounting on the Royco kernel"
        target: "${constants.kernel_address}"
        selector: "syncTrancheAccounting()"
        parameters: []

      # 3. ST balance
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      # 4. ST -> (stAssets, jtAssets, nav) tuple
      - description: "Convert ST shares to (stAssets, jtAssets, nav) tuple"
        target: "${constants.senior_tranche_address}"
        selector: "convertToAssets(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
        return:
          name: "asset_claims"
          type: "(uint256,uint256,uint256)"

      - description: "Extract stAssets (AA tranche units, 18 dec) from tuple [index 0]"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "(uint256,uint256,uint256)"
            value: "${returns.asset_claims}"
          - type: "uint256"
            value: "0"
        return:
          name: "st_assets"
          type: "uint256"

      - description: "Extract jtAssets (AA tranche units, 18 dec) from tuple [index 1]"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "(uint256,uint256,uint256)"
            value: "${returns.asset_claims}"
          - type: "uint256"
            value: "1"
        return:
          name: "jt_assets"
          type: "uint256"

      # 6. tranche_assets_partial = stAssets + jtAssets
      - description: "Sum stAssets + jtAssets"
        target: "${constants.unsigned_math_helper_address}"
        selector: "add(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_assets}"
          - type: "uint256"
            value: "${returns.jt_assets}"
        return:
          name: "tranche_assets"
          type: "uint256"

      # 7. virtualPrice(AA) — USDC-6dec per 1e18 AA
      # Per Pareto integrator guidance, use virtualPrice (live mark-to-market) rather
      # than tranchePrice (last stored). Equivalent during an active epoch for the
      # IdleCDOEpochVariant but the protocol team supports this entry point across
      # vault types.
      - description: "Read Pareto AA virtual price (USDC 6-dec per 1e18 AA)"
        target: "${constants.cdo_address}"
        selector: "virtualPrice(address)"
        parameters:
          - type: "address"
            value: "${constants.aa_tranche_address}"
        return:
          name: "tranche_price"
          type: "uint256"

      # 8. usdc_from_aa = tranche_assets * tranche_price / 1e18
      - description: "Convert tranche_assets to USDC: (total_aa * tranche_price) / 1e18"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.tranche_assets}"
          - type: "uint256"
            value: "${returns.tranche_price}"
          - type: "uint256"
            value: "1000000000000000000"
        return:
          name: "usdc_from_aa"
          type: "uint256"

      # 8. pending_usdc = FalconXUSDC.balanceOf(caliber)  (6-dec USDC, principal-only)
      # NOTE: For Fasanara-style (APR=0-default) Pareto vaults, also add
      # IdleCreditVault.apr0Users(caliber).settledInterest here. See header note.
      - description: "Get pending FalconXUSDC withdraw receipt (USDC 6-dec)"
        target: "${constants.falconx_usdc_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "pending_usdc"
          type: "uint256"

      # 9. total_usdc = usdc_from_aa + pending_usdc
      - description: "Sum usdc_from_aa + pending_usdc"
        target: "${constants.unsigned_math_helper_address}"
        selector: "add(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.usdc_from_aa}"
          - type: "uint256"
            value: "${returns.pending_usdc}"
        return:
          name: "total_usdc"
          type: "uint256"

    reserved_slots:
      - type: "uint256"
        value: "${returns.total_usdc}"
      - type: "uint256"
        value: "${builtins.UINT256_MAX}"
