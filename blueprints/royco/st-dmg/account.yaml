protocol: "royco-st-dmg"

# Royco Senior Tranche DMG UNIFIED Account Blueprint (supply-safe, no seed required)
# Values the full ST -> MT -> USDC lifecycle inside a single accounting read so the
# position survives the async withdrawal window (Caliber value-loss invariant):
#
#   1. resolve caliber address
#   2. kernel.syncTrancheAccounting() (refresh tranche state; permissionless)
#   3. balance = ST.balanceOf(caliber)
#   4. (state, claims, totalShares) = kernel.previewSyncTrancheAccounting(0)   # SENIOR
#        tranche_mt  = claims.stAssets + claims.jtAssets        # FULL-tranche DMG MT claim (18 dec)
#        active_mt   = mulDiv(tranche_mt, balance, max(totalShares, 1))   # caliber's pro-rata MT
#   5. pending_mt = KV.get(pending_mt_key)                      # MT in an outstanding redeem NFT (0 if none)
#   6. total_mt = active_mt + pending_mt
#   7. total_usdc = DMG_machine.convertToAssets(total_mt)       # MT -> USDC (6 dec), ONE conversion
#   reserved_slots: [total_usdc, UINT256_MAX]
#
# Same shape as the standard makina async-redeem accounting (live shares + pending shares ->
# convertToAssets ONCE on the sum), where the "shares" unit is DMG MT. The live leg is the
# caliber's pro-rata ST claim in MT; the pending leg is the MT held in the AsyncRedeemer redeem
# NFT (stored by request-redeem.yaml).
#
# SUPPLY-SAFE valuation (NO permanent seed needed): we do NOT call ST.convertToAssets, which
# divides by ST.totalSupply() and reverts Panic 0x12 at totalSupply()==0 (the sole/last-holder
# 100% exit). Instead we read the kernel's previewSyncTrancheAccounting(0) view -- which does NOT
# revert at supply 0 -- to get the FULL-tranche claim (claims.stAssets word 14 + claims.jtAssets
# word 15, both DMG MT) and totalTrancheShares (word 17), then do the pro-rata division OURSELVES
# with a SAFE denominator max(totalShares, 1). When totalShares>0 this equals
# ST.convertToAssets(balance).stAssets+jtAssets (jtAssets is 0 for the senior, so it is exactly
# stAssets) to the wei. When totalShares==0 the caliber's balance is necessarily 0, so active_mt
# = mulDiv(*, 0, 1) = 0 with no division by zero. Word indices: SyncedAccountingState is 14 static
# words, AssetClaims (stAssets, jtAssets, nav) is words 14/15/16, totalTrancheShares is word 17.
#
# Value-loss invariant (async withdraw): at requestRedeem time active_mt drops by ~mt_received and
# pending_mt rises by exactly mt_received, so total_mt is conserved and total_usdc is unchanged.
# The re-derived claim loses <=1 wei of 18-dec MT to rounding, which floors to 0 in the 18->6-dec
# convertToAssets (change == 0). The redemption fee surfaces at claim, where the USDC inflow gives
# a non-zero value-loss RHS. DMG_machine.convertToAssets(0)==0, so the idle position values to 0.

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  bytes32_helper_address:
    type: "address"
    value: "0x74DC739B8F98ad0F76Cd8900695DD8D5083E45D3"
  senior_tranche_address:
    type: "address"
    value: "0xaC9CF7e8f83C471cA596F4371fF002cdaF9573e6"
  kernel_address:
    type: "address"
    value: "0x753fB559B67DcED89020ef222bF87099776d1676"
  dmg_machine_address:
    type: "address"
    value: "0xc4ffab8540ac27e40d4e2930517aa711e9c00c5b"

inputs:
  kv_store_address:
    type: "address"
  pending_redemption_mt_storage_key:
    type: "bytes32"

actions:
  account:
    calls:
      # 1. Resolve caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. Sync tranche accounting before reading claims
      - description: "Sync tranche accounting on the kernel"
        target: "${constants.kernel_address}"
        selector: "syncTrancheAccounting()"
        parameters: []

      # 3. Active ST share balance
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      # 4a. Read FULL-tranche accounting WITHOUT dividing by totalSupply (supply-safe at supply 0).
      #     Return = (SyncedAccountingState[14 static words], AssetClaims[stAssets,jtAssets,nav], uint256)
      - description: "Preview senior-tranche accounting (supply-safe: never reverts at totalSupply==0)"
        target: "${constants.kernel_address}"
        selector: "previewSyncTrancheAccounting(uint8)"
        parameters:
          - type: "uint8"
            value: "0"
        return:
          name: "preview"
          type: "((uint8,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint32,uint256,uint256,uint256),(uint256,uint256,uint256),uint256)"

      # 4b. Extract FULL-tranche claims.stAssets (word 14) and claims.jtAssets (word 15), both DMG MT
      - description: "Extract full-tranche stAssets (DMG MT) at word 14"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "((uint8,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint32,uint256,uint256,uint256),(uint256,uint256,uint256),uint256)"
            value: "${returns.preview}"
          - type: "uint256"
            value: "14"
        return:
          name: "tranche_st_assets"
          type: "uint256"

      - description: "Extract full-tranche jtAssets (DMG MT) at word 15"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "((uint8,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint32,uint256,uint256,uint256),(uint256,uint256,uint256),uint256)"
            value: "${returns.preview}"
          - type: "uint256"
            value: "15"
        return:
          name: "tranche_jt_assets"
          type: "uint256"

      # 4c. Extract totalTrancheShares (word 17)
      - description: "Extract totalTrancheShares at word 17"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "((uint8,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint32,uint256,uint256,uint256),(uint256,uint256,uint256),uint256)"
            value: "${returns.preview}"
          - type: "uint256"
            value: "17"
        return:
          name: "total_tranche_shares"
          type: "uint256"

      # 4d. tranche_mt = stAssets + jtAssets (full-tranche DMG MT claim)
      - description: "Sum full-tranche DMG MT claim = stAssets + jtAssets"
        target: "${constants.unsigned_math_helper_address}"
        selector: "add(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.tranche_st_assets}"
          - type: "uint256"
            value: "${returns.tranche_jt_assets}"
        return:
          name: "tranche_mt"
          type: "uint256"

      # 4e. Safe denominator = max(totalShares, 1). Branchless: == totalShares when >0
      #     (so active_mt matches convertToAssets exactly), == 1 when supply==0 (balance is 0 -> 0).
      - description: "Safe denominator max(totalTrancheShares, 1) to avoid div-by-zero at supply 0"
        target: "${constants.unsigned_math_helper_address}"
        selector: "max(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.total_tranche_shares}"
          - type: "uint256"
            value: "1"
        return:
          name: "safe_denominator"
          type: "uint256"

      # 4f. active_mt = mulDiv(tranche_mt, balance, safeDen)  (caliber's pro-rata DMG MT claim)
      - description: "Caliber's pro-rata DMG MT claim: mulDiv(tranche_mt, st_shares, safeDen)"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.tranche_mt}"
          - type: "uint256"
            value: "${returns.st_shares}"
          - type: "uint256"
            value: "${returns.safe_denominator}"
        return:
          name: "active_mt"
          type: "uint256"

      # 5. Pending DMG MT in an outstanding redeem NFT (0 when no outstanding request)
      - description: "Read the pending DMG MT amount from KV store (0 if no pending request)"
        target: "${inputs.kv_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.pending_redemption_mt_storage_key}"
        return:
          name: "pending_mt"
          type: "uint256"

      # 6. total_mt = active_mt + pending_mt
      - description: "Sum live and pending DMG MT"
        target: "${constants.unsigned_math_helper_address}"
        selector: "add(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.active_mt}"
          - type: "uint256"
            value: "${returns.pending_mt}"
        return:
          name: "total_mt"
          type: "uint256"

      # 7. total_usdc = DMG_machine.convertToAssets(total_mt)  (ONE conversion on the sum; 0 when idle)
      - description: "Convert total DMG MT (live + pending) to USDC via the DMG machine"
        target: "${constants.dmg_machine_address}"
        selector: "convertToAssets(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.total_mt}"
        return:
          name: "total_usdc"
          type: "uint256"

    reserved_slots:
      - type: "uint256"
        value: "${returns.total_usdc}"
      - type: "uint256"
        value: "${builtins.UINT256_MAX}"
