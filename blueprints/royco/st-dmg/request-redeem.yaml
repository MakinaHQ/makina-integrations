protocol: "royco-st-dmg"

# Royco Senior Tranche DMG Request-Redeem Blueprint (async withdraw leg 1)
# Single transaction:
#   1. resolve caliber address
#   2. KV guard: read requestId key, require == 0 (no outstanding request)
#   3. st_shares = ST.balanceOf(caliber); shares_to_redeem = mulDiv(st_shares, bps, 10000)
#   4. balance-sandwich DMG MT (before) -> ST.redeem(shares, caliber, caliber) -> MT (after)
#      -> mt_received = after - before
#   5. approve mt_received -> AsyncRedeemer
#   6. AsyncRedeemer.requestRedeem(mt_received, caliber, min_assets) -> requestId
#   7. KV persist: set(requestId_key, requestId); set(pending_mt_key, mt_received)
#
# Mirrors the standard makina async-redeem request (blueprints/makina/redeem.yaml): we persist
# the DMG MT amount placed into the redeem NFT (mt_received) as the pending term. account.yaml
# adds that pending MT to the caliber's live ST claim and converts the sum to USDC ONCE via the
# DMG machine. Across this request the live claim drops by ~mt_received and the pending term rises
# by exactly mt_received, so total MT (hence the USDC value) is conserved -> value-neutral, as
# required because the request moves no USDC (Caliber value-loss RHS == 0). The redemption fee
# surfaces at claim, where the USDC inflow gives RHS > 0. No before/after valuation is needed
# here: storing the conserved MT amount is sufficient (see account.yaml for the full rationale).

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  boolean_helper_address:
    type: "address"
    value: "0x00c93e3b09Ca2f544487d4298339765EadCD8353"
  caliber_helper_address:
    type: "address"
    value: "0x6E2ED2f457c41F38556Ab0c2b1185cc9e6563d8D"
  dmg_mt_address:
    type: "address"
    value: "0x761c3b16A5afDD7a1869c4b979cFF3383d5fE98b"
  senior_tranche_address:
    type: "address"
    value: "0xaC9CF7e8f83C471cA596F4371fF002cdaF9573e6"
  async_redeemer_address:
    type: "address"
    value: "0x21a9c31825fa1d8bf5f2378a3c95e823290b0637"

inputs:
  kv_store_address:
    type: "address"
  redemption_request_id_storage_key:
    type: "bytes32"
  pending_redemption_mt_storage_key:
    type: "bytes32"

actions:
  request_redeem:
    calls:
      # 1. Resolve caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. KV guard: ensure no outstanding redemption request
      - description: "Read existing request ID from KV store to check no pending request exists"
        target: "${inputs.kv_store_address}"
        selector: "get(bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.redemption_request_id_storage_key}"
        return:
          name: "existing_request_id"
          type: "uint256"

      - description: "Check that existing request ID is zero (no pending request)"
        target: "${constants.caliber_helper_address}"
        selector: "eq(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.existing_request_id}"
          - type: "uint256"
            value: "0"
        return:
          name: "existing_request_id_is_zero"
          type: "bool"

      - description: "Revert if there is already a pending request (would overwrite requestId)"
        target: "${constants.boolean_helper_address}"
        selector: "revertIfFalse(bool)"
        parameters:
          - type: "bool"
            value: "${returns.existing_request_id_is_zero}"

      # 3. Read ST balance and compute shares to redeem from bps
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      - description: "Calculate ST shares to redeem based on basis points"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      # 4. Balance-sandwich DMG MT around ST.redeem
      - description: "Get DMG MT balance before ST redeem"
        target: "${constants.dmg_mt_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "mt_before"
          type: "uint256"

      - description: "Redeem Senior Tranche shares to receive DMG MT (synchronous)"
        target: "${constants.senior_tranche_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

      - description: "Get DMG MT balance after ST redeem"
        target: "${constants.dmg_mt_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "mt_after"
          type: "uint256"

      - description: "Calculate DMG MT received from ST redeem (after - before)"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.mt_after}"
          - type: "uint256"
            value: "${returns.mt_before}"
        return:
          name: "mt_received"
          type: "uint256"

      # 5. Approve DMG MT to the AsyncRedeemer
      - description: "Approve DMG MT spending by the AsyncRedeemer"
        target: "${constants.dmg_mt_address}"
        selector: "approve(address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.async_redeemer_address}"
          - type: "uint256"
            value: "${returns.mt_received}"

      # 6. Request async redemption of the DMG MT -> requestId / redeem NFT
      - description: "Request async redemption of DMG MT via the AsyncRedeemer"
        target: "${constants.async_redeemer_address}"
        selector: "requestRedeem(uint256,address,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.mt_received}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "uint256"
            value: "${input_slots.min_assets}"
        return:
          name: "request_id"
          type: "uint256"

      # 7. Persist request ID and pending DMG MT amount in the KV store
      - description: "Store the request ID in the KV store for later claim and as the guard"
        target: "${inputs.kv_store_address}"
        selector: "set(bytes32,bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.redemption_request_id_storage_key}"
          - type: "uint256"
            value: "${returns.request_id}"

      - description: "Store the pending DMG MT amount in the KV store for accounting"
        target: "${inputs.kv_store_address}"
        selector: "set(bytes32,bytes32)"
        parameters:
          - type: "bytes32"
            value: "${inputs.pending_redemption_mt_storage_key}"
          - type: "uint256"
            value: "${returns.mt_received}"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of ST shares to redeem (10000 = 100%)"
      min_assets:
        type: "uint256"
        description: "Minimum USDC to receive at finalization (slippage protection, 6 decimals)"
