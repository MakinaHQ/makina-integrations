protocol: "royco-st-smokehouse-usdc"

# Royco Senior Tranche SmokehouseUSDC Withdraw Blueprint
# Single-transaction withdraw: redeem ST shares -> bbqUSDC -> redeem bbqUSDC -> USDC

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  bbqusdc_address:
    type: "address"
    value: "0xBEeFFF209270748ddd194831b3fa287a5386f5bC"
  senior_tranche_address:
    type: "address"
    value: "0xa225F24654b8995036606D5Cd0634133a4BE169c"

inputs: {}

actions:
  withdraw:
    calls:
      # 1. Get caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # 2. Get ST share balance
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      # 3. Calculate shares to redeem from bps
      - description: "Calculate shares to redeem based on basis points"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      # 4. Balance sandwich: bbqUSDC before ST redeem
      - description: "Get bbqUSDC balance before ST redeem"
        target: "${constants.bbqusdc_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "bbqusdc_before"
          type: "uint256"

      # 5. Redeem ST shares to receive bbqUSDC
      - description: "Redeem Senior Tranche shares to receive bbqUSDC"
        target: "${constants.senior_tranche_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

      # 6. Balance sandwich: bbqUSDC after ST redeem
      - description: "Get bbqUSDC balance after ST redeem"
        target: "${constants.bbqusdc_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "bbqusdc_after"
          type: "uint256"

      # 7. Calculate bbqUSDC received from ST redeem (after - before)
      - description: "Calculate bbqUSDC received from ST redeem"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.bbqusdc_after}"
          - type: "uint256"
            value: "${returns.bbqusdc_before}"
        return:
          name: "bbqusdc_delta"
          type: "uint256"

      # 8. Redeem bbqUSDC delta for USDC (no approval needed, caller is owner)
      - description: "Redeem bbqUSDC for USDC"
        target: "${constants.bbqusdc_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.bbqusdc_delta}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of ST shares to redeem (10000 = 100%)"
