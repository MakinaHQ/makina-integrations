protocol: "royco-st-stcusd"

# Royco Senior Tranche stcUSD - Full Withdraw Blueprint
# Atomic unwind: ST-stcUSD -> stcUSD (kernel sends asset) -> cUSD (ERC4626) -> USDC (Cap Vault.burn)
#
# NO whitelist guard: this is the escape hatch. If the caliber has been un-whitelisted on the
# Cap Vault, the burn step still executes but pays the dynamic burn fee (~0.1% as of 2026-04).
# Operator's choice: pay the fee for atomic exit (this flow), or use withdraw-to-cusd then
# DCA out via secondary markets to avoid the fee.
#
# Basket-asset note: the Cap Vault holds multiple backing assets (USDC and wWTGXX as of
# 2026-04, more may be added). We deliberately call burn(asset=USDC, ...) which is the
# SINGLE-ASSET path — receives USDC only, never wWTGXX or other basket components. The
# basket-redemption function is the separate redeem(amountIn, minAmountsOut[], ...) call,
# which we never invoke. So new backing assets in the Vault are irrelevant to this flow's
# output — only the Vault's USDC inventory liquidity matters.
#
# Liquidity revert: if the Vault has insufficient idle USDC to honor the burn (because
# too much is lent out via the Lender), the burn step reverts. Fall back to
# withdraw-to-cusd.yaml + secondary-market DCA when this happens.
#
# Use bps_to_redeem to control how much of the position to unwind (10000 = 100%).

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  usdc_address:
    type: "address"
    value: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
  cusd_address:
    type: "address"
    value: "0xcCcc62962d17b8914c62D74FfB843d73B2a3cccC"
  stcusd_address:
    type: "address"
    value: "0x88887bE419578051FF9F4eb6C858A951921D8888"
  senior_tranche_address:
    type: "address"
    value: "0xa7Da92685ea436276B2e87aE12E5eE6DABaD5bB5"

inputs: {}

actions:
  withdraw:
    calls:
      # Get caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # Compute ST shares to redeem from bps
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      - description: "Calculate ST shares to redeem based on basis points"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
          - type: "uint256"
            value: "${input_slots.bps_to_redeem}"
          - type: "uint256"
            value: "10000"
        return:
          name: "shares_to_redeem"
          type: "uint256"

      # Step 1: ST-stcUSD -> stcUSD (kernel transfers stcUSD directly to caliber).
      # Sandwich the stcUSD balance to know exactly how much was received,
      # avoiding reliance on the AssetClaims tuple return shape.
      - description: "Get stcUSD balance before ST redeem"
        target: "${constants.stcusd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "stcusd_before"
          type: "uint256"

      - description: "Redeem Senior Tranche shares to receive stcUSD"
        target: "${constants.senior_tranche_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.shares_to_redeem}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"

      - description: "Get stcUSD balance after ST redeem"
        target: "${constants.stcusd_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "stcusd_after"
          type: "uint256"

      - description: "Compute stcUSD received from ST redeem"
        target: "${constants.unsigned_math_helper_address}"
        selector: "sub(uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.stcusd_after}"
          - type: "uint256"
            value: "${returns.stcusd_before}"
        return:
          name: "stcusd_received"
          type: "uint256"

      # Step 2: stcUSD -> cUSD via ERC4626 redeem (no approval — caliber is owner)
      - description: "Redeem stcUSD for cUSD"
        target: "${constants.stcusd_address}"
        selector: "redeem(uint256,address,address)"
        parameters:
          - type: "uint256"
            value: "${returns.stcusd_received}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "cusd_received"
          type: "uint256"

      # Step 3: cUSD -> USDC via Cap Vault.burn (no fees as long as caliber is whitelisted)
      - description: "Burn cUSD for USDC via Cap Vault"
        target: "${constants.cusd_address}"
        selector: "burn(address,uint256,uint256,address,uint256)"
        parameters:
          - type: "address"
            value: "${constants.usdc_address}"
          - type: "uint256"
            value: "${returns.cusd_received}"
          - type: "uint256"
            value: "${input_slots.min_usdc_out}"
          - type: "address"
            value: "${returns.caliber_address}"
          - type: "uint256"
            value: "${builtins.UINT256_MAX}" # deadline

    input_slots:
      bps_to_redeem:
        type: "uint256"
        description: "Basis points of ST shares to redeem (10000 = 100%)"
      min_usdc_out:
        type: "uint256"
        description: "Minimum USDC to receive from Cap Vault.burn (6 decimals). The exact output depends on (a) the Vault's current value-per-cUSD rate, which moves with Lender interest and basket PnL — even whitelisted users do NOT get an exact 1:1 conversion (rate was ~0.999999149 USDC/cUSD as of 2026-04); and (b) the dynamic burn fee, which whitelisted callers bypass but un-whitelisted callers pay (~0.1% as of 2026-04, but verify on-chain). Operator must quote fresh via cUSD.getBurnAmount(caliber, USDC, cusd_received) immediately before broadcasting and apply a small tolerance (e.g., 1-2 bps)."
