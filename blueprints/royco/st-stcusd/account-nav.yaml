protocol: "royco-st-stcusd"

# Royco Senior Tranche stcUSD - NAV-based Account Blueprint
# Syncs tranche accounting on the Royco kernel, then reads convertToAssets(shares)
# on the senior tranche to extract the NAV field (USD WAD, 18 decimals).
# Scales NAV down to USDC (6 decimals) for caliber accounting.
#
# NAV semantics (from RoycoKernel._deriveTrancheAssetClaims):
#   For SENIOR: claims.nav = state.stEffectiveNAV
#   convertToAssets(myShares).nav = stEffectiveNAV * myShares / trancheTotalShares
#   trancheTotalShares already includes virtual share + would-be-minted fee shares,
#   so this is the post-sync USD value of the caliber's pro-rata position.
#   Self-liquidation bonus is NOT applied here (only in stPreviewRedeem / stRedeem),
#   keeping accounting conservative.

constants:
  context_helper_address:
    type: "address"
    value: "0x0f431322E1fF2500D4C5a4E090A7Da7344F953BE"
  unsigned_math_helper_address:
    type: "address"
    value: "0x3D623B199E290358416415eA7e05B635E442e3c0"
  bytes32_helper_address:
    type: "address"
    value: "0x74DC739B8F98ad0F76Cd8900695DD8D5083E45D3"
  senior_tranche_address:
    type: "address"
    value: "0xa7Da92685ea436276B2e87aE12E5eE6DABaD5bB5"
  kernel_address:
    type: "address"
    value: "0x9911F227E9428964D8A35B852513919C8DF92038"

inputs: {}

actions:
  account_nav:
    calls:
      # Get caliber address
      - description: "Get caliber's address"
        target: ${constants.context_helper_address}
        selector: "msgSender()"
        parameters: []
        return:
          name: "caliber_address"
          type: "address"

      # Sync tranche accounting state before reading NAV (crystallizes protocol fee shares)
      - description: "Sync tranche accounting on the Royco kernel"
        target: "${constants.kernel_address}"
        selector: "syncTrancheAccounting()"
        parameters: []

      # Get ST share balance
      - description: "Get Senior Tranche share balance"
        target: "${constants.senior_tranche_address}"
        selector: "balanceOf(address)"
        parameters:
          - type: "address"
            value: "${returns.caliber_address}"
        return:
          name: "st_shares"
          type: "uint256"

      # Convert ST shares to AssetClaims tuple (stAssets, jtAssets, nav) — scaled to caliber's pro-rata share
      - description: "Convert ST shares to asset claims with NAV"
        target: "${constants.senior_tranche_address}"
        selector: "convertToAssets(uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.st_shares}"
        return:
          name: "asset_claims"
          type: "(uint256,uint256,uint256)"

      # Extract nav (index 2) — USD value at 18 decimals (NAV_UNIT == WAD)
      - description: "Extract NAV (USD 18 decimals) from asset claims tuple"
        target: "${constants.bytes32_helper_address}"
        selector: "getTupleWord(bytes,uint256)"
        parameters:
          - type: "(uint256,uint256,uint256)"
            value: "${returns.asset_claims}"
          - type: "uint256"
            value: "2"
        return:
          name: "nav_usd_18dec"
          type: "uint256"

      # Scale NAV from USD-WAD (18 dec) down to USDC (6 dec)
      - description: "Convert NAV from USD (18 dec) to USDC (6 dec)"
        target: "${constants.unsigned_math_helper_address}"
        selector: "mulDiv(uint256,uint256,uint256)"
        parameters:
          - type: "uint256"
            value: "${returns.nav_usd_18dec}"
          - type: "uint256"
            value: "1"
          - type: "uint256"
            value: "1000000000000"
        return:
          name: "usdc_value"
          type: "uint256"

    reserved_slots:
      - type: "uint256"
        value: "${returns.usdc_value}"
      - type: "uint256"
        value: "${builtins.UINT256_MAX}"
