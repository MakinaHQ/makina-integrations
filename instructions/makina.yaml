# Makina cross-holding — deposit into, account, and redeem from another Makina vault.
#
# A generic, vault-agnostic position: any caliber that holds the share token (MT) of
# another Makina machine includes this file and sets the vars below.
#
# Expected position vars:
#   label:             string   — position label, e.g. "DUSD"
#   machine_token:     address  — the vault's share token (MT) held by this caliber
#   machine:           address  — the vault's Machine contract (convertToAssets lives here)
#   depositor:         address  — the vault's Depositor (async deposit entrypoint)
#   redeemer:          address  — the vault's Redeemer (async redeem entrypoint)
#   accounting_token:  address  — the vault's underlying / deposit+claim asset (e.g. USDC)
#   redemption_request_id_key:            bytes32 — KV-store key for the live redeem request id
#   pending_redemption_share_amount_key:  bytes32 — KV-store key for pending redeem share amount
#
# Storage keys are keccak256 of a per-vault namespace string and MUST match the keeper's keys.
# The transpiler hashes keccak256() arguments verbatim and cannot resolve ${position.*} inside
# them, so the keys are precomputed and passed as bytes32 vars. Compute with:
#   cast keccak "makina.<chain>.<slug>.redemption_request_id"
#   cast keccak "makina.<chain>.<slug>.pending_redemption_share_amount"
#
# Expected config:
#   caliber_address, key_value_store_address, unsigned_math_helper_address,
#   boolean_helper_address, caliber_helper_address
#
# Example position block in caliber.yaml:
#   - id: "257907866263469253975271928750178105060"
#     group_id: "0"
#     description: "Makina DUSD"
#     instructions: !include "../../../instructions/makina.yaml"
#     position_tokens: ["0x1e33E98AF620F1D563fCD3cfD3c75ACe841204ef"]
#     vars:
#       label: "DUSD"
#       machine_token: "0x1e33E98AF620F1D563fCD3cfD3c75ACe841204ef"
#       machine: "0x6b006870C83b1Cd49E766Ac9209f8d68763Df721"
#       depositor: "0x94B1828F91c150C5E6776198e170aCa4304903d7"
#       redeemer: "0x1303c26cFE06bac5bfEE29907f37919643DEF75c"
#       accounting_token: ${token_list.mainnet.USDC}
#       # keccak256("makina.mainnet.dusd.redemption_request_id")
#       redemption_request_id_key: "0x8134214dae542e89e9da9bf898cce9ad9d0bd9a3c9c8bc487ebc62a4e916fd3d"
#       # keccak256("makina.mainnet.dusd.pending_redemption_share_amount")
#       pending_redemption_share_amount_key: "0xac0ec79dcce79f61142b7d5733bbb493647dcc32c18fdc97d06e9a4b7d39eaef"

# 1/5 - DEPOSIT: async deposit of accounting_token into the vault via the Depositor
- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.accounting_token}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/makina/deposit.yaml:deposit"
    inputs:
      accounting_token_address:
        type: "address"
        value: ${position.accounting_token}
      depositor_address:
        type: "address"
        value: ${position.depositor}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"

# 2/5 - ACCOUNTING: value held MT shares (incl. pending redemption) in accounting_token terms
- is_debt: false
  instruction_type: "ACCOUNTING"
  affected_tokens:
    - ${position.accounting_token}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/makina/account.yaml:account"
    inputs:
      machine_token_address:
        type: "address"
        value: ${position.machine_token}
      machine_address:
        type: "address"
        value: ${position.machine}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"
      kv_store_address:
        type: "address"
        value: "${config.key_value_store_address}"
      unsigned_math_helper:
        type: "address"
        value: "${config.unsigned_math_helper_address}"
      pending_redemption_share_amount_storage_key:
        type: "bytes32"
        value: ${position.pending_redemption_share_amount_key}

# 3/5 - REQUEST REDEEM: queue an absolute share amount for redemption
- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens: []
  instruction:
    label: ${position.label}
    path: "../../../blueprints/makina/redeem.yaml:request_redeem"
    inputs:
      machine_token_address:
        type: "address"
        value: ${position.machine_token}
      redeemer_address:
        type: "address"
        value: ${position.redeemer}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"
      kv_store_address:
        type: "address"
        value: "${config.key_value_store_address}"
      boolean_helper_address:
        type: "address"
        value: "${config.boolean_helper_address}"
      unsigned_math_helper_address:
        type: "address"
        value: "${config.unsigned_math_helper_address}"
      redemption_request_id_storage_key:
        type: "bytes32"
        value: ${position.redemption_request_id_key}
      pending_redemption_share_amount_storage_key:
        type: "bytes32"
        value: ${position.pending_redemption_share_amount_key}
      caliber_helper_address:
        type: "address"
        value: "${config.caliber_helper_address}"

# 4/5 - REQUEST REDEEM (relative): queue a fraction (bps) of held shares for redemption
- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens: []
  instruction:
    label: ${position.label}
    path: "../../../blueprints/makina/redeem.yaml:request_redeem_relative"
    inputs:
      machine_token_address:
        type: "address"
        value: ${position.machine_token}
      redeemer_address:
        type: "address"
        value: ${position.redeemer}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"
      kv_store_address:
        type: "address"
        value: "${config.key_value_store_address}"
      boolean_helper_address:
        type: "address"
        value: "${config.boolean_helper_address}"
      unsigned_math_helper_address:
        type: "address"
        value: "${config.unsigned_math_helper_address}"
      redemption_request_id_storage_key:
        type: "bytes32"
        value: ${position.redemption_request_id_key}
      pending_redemption_share_amount_storage_key:
        type: "bytes32"
        value: ${position.pending_redemption_share_amount_key}
      caliber_helper_address:
        type: "address"
        value: "${config.caliber_helper_address}"

# 5/5 - CLAIM: claim matured accounting_token from a settled redemption request
- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.accounting_token}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/makina/redeem.yaml:claim_assets"
    inputs:
      redeemer_address:
        type: "address"
        value: ${position.redeemer}
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"
      kv_store_address:
        type: "address"
        value: "${config.key_value_store_address}"
      redemption_request_id_storage_key:
        type: "bytes32"
        value: ${position.redemption_request_id_key}
      pending_redemption_share_amount_storage_key:
        type: "bytes32"
        value: ${position.pending_redemption_share_amount_key}
