# AaveV3 Supply — deposit, withdraw, and account for a supplied (non-debt) asset.
#
# Expected caliber vars:
#   label:         string   — token name (e.g. "USDC", "WETH")
#   asset_address: address  — underlying token address
#   aave_token:    address  — aToken address (for accounting balanceOf)
#
# Expected config:
#   caliber_address
#   aavev3_core_instance

- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.asset_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/aave/deposit.yaml:add_collateral"
    inputs:
      on_behalf_of:
        type: "address"
        value: ${config.caliber_address}
      asset_address:
        type: "address"
        value: ${position.asset_address}
      aave_pool_instance:
        type: "address"
        value: "${config.aavev3_core_instance}"

- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${position.asset_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/aave/withdraw.yaml:withdraw_collateral"
    inputs:
      to:
        type: "address"
        value: ${config.caliber_address}
      asset_address:
        type: "address"
        value: ${position.asset_address}
      aave_pool_instance:
        type: "address"
        value: "${config.aavev3_core_instance}"

- is_debt: false
  instruction_type: "ACCOUNTING"
  affected_tokens:
    - ${position.asset_address}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/aave/account.yaml:account"
    inputs:
      aave_token:
        type: "address"
        value: ${position.aave_token}
      account:
        type: "address"
        value: "${config.caliber_address}"
