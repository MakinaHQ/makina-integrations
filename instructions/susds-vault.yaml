- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - ${token_list.mainnet.USDC}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/sky/susds/deposit.yaml:deposit_vault"
    inputs:
      usdc_address:
        type: "address"
        value: ${token_list.mainnet.USDC}
      usds_address:
        type: "address"
        value: ${token_list.mainnet.USDS}
      vault_address:
        type: "address"
        value: ${token_list.mainnet.sUSDS}
      psm_address:
        type: "address"
        value: ${position.psm_address}
      caliber_address:
        type: "address"
        value: ${config.caliber_address}
      referral_code:
        type: "uint16"
        value: ${position.referral_code}

- is_debt: false
  instruction_type: "ACCOUNTING"
  affected_tokens:
    - ${token_list.mainnet.USDS}
  instruction:
    label: ${position.label}
    path: "../../../blueprints/sky/susds/account.yaml:account_vault"
    inputs:
      vault_address:
        type: "address"
        value: ${token_list.mainnet.sUSDS}
      subject:
        type: "address"
        value: ${config.caliber_address}

- is_debt: false
