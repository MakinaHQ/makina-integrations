  # ── Noon Staked USN (sUSN) — BASE-TOKEN model (group_id: 0) ──────────
  # sUSN is registered as a caliber BASE token (addBaseToken + an OracleRegistry
  # sUSN feed = 4626 rate route), so the held sUSN is priced directly by the
  # base-token registry — hence NO position_tokens here. USN is also a base token
  # (deposit input + claim output). Deposit is a synthetic swap (USN -> sUSN);
  # accounting returns ONLY the KV-tracked in-flight WithdrawalHandler request
  # (pending-only, like the EtherFi async-redemption position), 0 otherwise, so the
  # active sUSN is never double-counted. Exit is the 7-day cooldown (request -> wait
  # -> claim). This is the base-token alternative to the position-model PR #257.
  #
  # GO-LIVE PREREQUISITE (on-chain governance, outside these files): register the
  # USN and sUSN OracleRegistry feed routes and addBaseToken(USN)/addBaseToken(sUSN).
  - id: "294421829413359114064708960489435288598"
    group_id: "0"
    description: "Noon Staked USN (sUSN) — base token"
    instructions: !include "../../../instructions/noon-susn.yaml"
    vars:
      label: "sUSN"
      susn_address: "0xE24a3DC889621612422A64E6388927901608B91D"
