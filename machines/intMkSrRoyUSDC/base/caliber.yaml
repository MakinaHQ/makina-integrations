positions:
  # ── Noon sUSN OTC swap (position-token model, group_id: 0) ────────────────
  # sUSN on Base is a bridged OFT (not mintable / not bridgeable via Makina), so the
  # caliber trades USDC against an EOA we control to acquire/release it (raw
  # transfer/transferFrom, no settler). sUSN is a POSITION token valued by the
  # ACCOUNTING leg via the Makina OracleRegistry (getPrice sUSN->USDC over the 2-feed
  # route); USDC is the only base token that moves. Slippage is enforced on-chain by
  # the caliber's loss reconciliation (USDC delta vs oracle-priced sUSN delta). Same
  # model as the securitize/VBILL position. Requires on-chain only the sUSN
  # OracleRegistry route (NO addBaseToken — sUSN is a position token).
  - id: "323638792813778024403827224996075207355" # Noon USN (Base), dialectic_id f37a907104f7513d9ecf7887bbcefabb
    group_id: "0"
    description: "Noon sUSN OTC swap"
    instructions: !include "./instructions/noon-susn-otc.yaml"
    position_tokens:
      - "0x34a2798D47b238A7CbA9D87D49618DEE6C4D999F" # sUSN
    vars:
      label: "sUSN OTC"

