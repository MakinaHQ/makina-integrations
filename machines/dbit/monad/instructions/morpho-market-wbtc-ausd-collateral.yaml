# add collateral
- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - "0x0555E30da8f98308EdB960aa94C0Db47230d2B9c" # WBTC
  instruction:
    label: "WBTC/AUSD (0x0ce0...0955)"
    path: "../../../blueprints/morpho/deposit.yaml:add_collateral"
    inputs:
      morpho:
        type: "address"
        value: "${config.morpho_address}"
      executor_helper:
        type: "address"
        value: "${config.caliber_helper_address}"
      market_id:
        type: "bytes32"
        value: "0x0ce0a3398925f5112360db21750912f2a834c5cb90ecf03f461b2e2561320955"
      collateral_token:
        type: "address"
        value: "0x0555E30da8f98308EdB960aa94C0Db47230d2B9c" # WBTC
      caliber_address:
        type: "address"
        value: "${config.caliber_address}"

# withdraw collateral
- is_debt: false
  instruction_type: "MANAGEMENT"
  affected_tokens:
    - "0x0555E30da8f98308EdB960aa94C0Db47230d2B9c" # WBTC
  instruction:
    label: "WBTC/AUSD (0x0ce0...0955)"
    path: "../../../blueprints/morpho/withdraw.yaml:withdraw_collateral"
    inputs:
      morpho:
        type: "address"
        value: "${config.morpho_address}"
      market_id:
        type: "bytes32"
        value: "0x0ce0a3398925f5112360db21750912f2a834c5cb90ecf03f461b2e2561320955"
      executor_helper:
        type: "address"
        value: "${config.caliber_helper_address}"
      receiver_address:
        type: "address"
        value: "${config.caliber_address}"

# account for position collateral
- is_debt: false
  instruction_type: "ACCOUNTING"
  affected_tokens:
    - "0x0555E30da8f98308EdB960aa94C0Db47230d2B9c" # WBTC
  instruction:
    label: "WBTC/AUSD (0x0ce0...0955)"
    path: "../../../blueprints/morpho/account.yaml:account_collateral"
    inputs:
      market_id:
        type: "bytes32"
        value: "0x0ce0a3398925f5112360db21750912f2a834c5cb90ecf03f461b2e2561320955"
      morpho:
        type: "address"
        value: "${config.morpho_address}"
      executor_helper:
        type: "address"
        value: "${config.caliber_helper_address}"
      subject:
        type: "address"
        value: "${config.caliber_address}"
