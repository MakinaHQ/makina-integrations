# Validates token list entries against on-chain ERC-20 metadata via Alchemy.
# Catches copy-paste bugs where an address from one chain ends up in another,
# or where name/symbol/decimals are stale or incorrect.
#
# Required repo secret:
#   - ALCHEMY_API_KEY
#
# Fork PRs require the "safe-to-test" label before this workflow will run.
# Same-repo PRs run automatically.

name: Token Lists

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  validate-token-lists:
    name: Validate changed token lists
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'safe-to-test')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=AM "origin/$BASE_REF" -- 'token-lists/*.json')
            SCRIPT_CHANGED=$(git diff --name-only "origin/$BASE_REF" -- 'scripts/validate_token_lists.py' 'tests/test_validate_token_lists.py')
          else
            CHANGED_FILES=$(find token-lists -maxdepth 1 -type f -name '*.json' | sort)
            SCRIPT_CHANGED=""
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "changed_files=" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=0" >> "$GITHUB_OUTPUT"
          else
            {
              echo "changed_files<<TOKEN_LISTS_EOF"
              echo "$CHANGED_FILES"
              echo "TOKEN_LISTS_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "changed_files_count=$(echo "$CHANGED_FILES" | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$SCRIPT_CHANGED" ]; then
            echo "script_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "script_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.changes.outputs.changed_files_count > 0 || steps.changes.outputs.script_changed == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Run unit tests
        if: steps.changes.outputs.changed_files_count > 0 || steps.changes.outputs.script_changed == 'true'
        run: uv run python -m unittest tests.test_validate_token_lists -v

      - name: Validate token lists against live ERC-20 metadata
        if: steps.changes.outputs.changed_files_count > 0
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          CHANGED_TOKEN_LISTS: ${{ steps.changes.outputs.changed_files }}
        run: uv run python scripts/validate_token_lists.py ${CHANGED_TOKEN_LISTS}

      - name: Skip when no token lists changed
        if: steps.changes.outputs.changed_files_count == 0 && steps.changes.outputs.script_changed == 'false'
        run: echo "No token list files to validate."
